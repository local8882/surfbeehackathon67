<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WASH Aerial Inspector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --bg: #0a0e0f;
      --surface: #111618;
      --border: #1e2729;
      --text: #e8eef0;
      --muted: #5a6e72;
      --accent: #00d4aa;
      --accent2: #ff6b35;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .status-pill {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    main {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 73px);
    }

    .left-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px;
      gap: 24px;
      overflow-y: auto;
    }

    .panel-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #dropzone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    #dropzone:hover, #dropzone.dragover {
      border-color: var(--accent);
      background: rgba(0,212,170,0.04);
    }

    .drop-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .drop-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .drop-sub {
      font-size: 13px;
      color: var(--muted);
    }

    #file-input { display: none; }

    #preview-wrap {
      display: none;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    #preview-wrap img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }

    .preview-overlay {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
    }

    #analyse-btn {
      display: none;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #result-card {
      display: none;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .result-label-text {
      font-size: 22px;
      font-weight: 800;
    }

    .severity-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .badge-low    { background: rgba(34,197,94,0.15); color: var(--low); }
    .badge-medium { background: rgba(245,158,11,0.15); color: var(--medium); }
    .badge-high   { background: rgba(239,68,68,0.15); color: var(--high); }

    .conf-bars { display: flex; flex-direction: column; gap: 8px; }

    .conf-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .conf-name {
      width: 140px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
    }

    .conf-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .conf-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s;
      width: 0%;
    }

    .conf-pct {
      width: 36px;
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .loc-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .loc-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
    }

    #pin-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .right-panel {
      display: flex;
      flex-direction: column;
    }

    .map-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    #map { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛰</div>
    WASH Aerial Inspector
  </div>

  <div class="status-pill">
    <div class="status-dot" id="model-dot"></div>
    <span id="model-status">connecting…</span>
  </div>
</header>

<main>
  <div class="left-panel">

    <div>
      <div class="panel-label" style="margin-bottom:12px">01 — Upload aerial image</div>

      <div id="dropzone" onclick="document.getElementById('file-input').click()">
        <span class="drop-icon">📡</span>
        <div id="drop-msg">
          <div class="drop-title">Drop aerial image here</div>
          <div class="drop-sub">JPG, PNG, WebP — any size</div>
        </div>
        <input type="file" id="file-input" accept="image/*"/>
      </div>

      <div id="preview-wrap" style="margin-top:16px;">
        <img id="preview-img" src="" alt="preview"/>
        <div class="preview-overlay" id="img-name">image.jpg</div>
      </div>
    </div>

    <button id="analyse-btn">Analyse Image</button>

    <div id="result-card">
      <div class="panel-label" style="margin-bottom:12px">02 — Classification result</div>

      <div class="result-header">
        <div class="result-label-text" id="result-label">—</div>
        <div class="severity-badge" id="severity-badge">—</div>
      </div>

      <div class="conf-bars" id="conf-bars"></div>

      <div style="margin-top:16px;">
        <div class="panel-label" style="margin-bottom:8px">03 — Pin on map</div>

        <div class="loc-row">
          <input class="loc-input" id="lat-input" placeholder="Latitude" value="-1.2864" type="number"/>
          <input class="loc-input" id="lng-input" placeholder="Longitude" value="36.8172" type="number"/>
        </div>

        <button id="pin-btn">📍 Drop pin on map</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="map-header">
      <span class="panel-label">Live risk map</span>
      <span id="pin-count">0 sites flagged</span>
    </div>

    <div id="map"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.addEventListener('load', function() {

const API_URL = "https://tusk-fool-conjuror.ngrok-free.dev/predict";
let currentFile = null;

const map = L.map('map').setView([-1.2880, 36.8190], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  maxZoom: 19
}).addTo(map);

let pinCount = 0;
let lastResult = null;

const severityColor = {
  low:'#22c55e',
  medium:'#f59e0b',
  high:'#ef4444'
};

function makeCircleIcon(color) {
  return L.divIcon({
    html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:3px solid rgba(255,255,255,0.3)"></div>`,
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });
}

function setModelStatus(ready, text) {
  document.getElementById('model-status').textContent = text;
  document.getElementById('model-dot').className = 'status-dot' + (ready ? ' ready' : '');
}

async function loadModel() {
  setModelStatus(true, 'Server connected');
}

async function remoteInference(file) {
  const formData = new FormData();
  formData.append('image', file);

  const response = await fetch(API_URL, {
    method: 'POST',
    body: formData
  });

  if (!response.ok) {
    throw new Error('Prediction failed');
  }

  return await response.json();
}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

function preventDefaults(e) {
  e.preventDefault();
  e.stopPropagation();
}

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
  dropzone.addEventListener(eventName, preventDefaults, false);
});

['dragenter', 'dragover'].forEach(eventName => {
  dropzone.addEventListener(eventName, () => {
    dropzone.classList.add('dragover');
  }, false);
});

['dragleave', 'drop'].forEach(eventName => {
  dropzone.addEventListener(eventName, () => {
    dropzone.classList.remove('dragover');
  }, false);
});

dropzone.addEventListener('drop', e => {

  const files = e.dataTransfer.files;

  if (files && files.length > 0) {
    currentFile = files[0];
    handleFile(files[0]);
  }

});

fileInput.addEventListener('change', e => {

  if (e.target.files.length > 0) {
    currentFile = e.target.files[0];
    handleFile(e.target.files[0]);
  }

});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;

  currentFile = file;

  const reader = new FileReader();

  reader.onload = ev => {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('img-name').textContent = file.name;
    document.getElementById('analyse-btn').style.display = 'block';
  };

  reader.readAsDataURL(file);
}



async function runInference() {
  const btn = document.getElementById('analyse-btn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analysing…';

  const file = currentFile;

  try {
    if (!file) {
      alert('Please upload an image first');
      btn.disabled = false;
      btn.innerHTML = 'Analyse Image';
      return;
    }

    const result = await remoteInference(file);

    const confidence = result.max_confidence || 0;

    let label;
    let severity;

    if (result.litter_detected) {
      label = 'Marine Litter Detected';
      severity = confidence > 0.7 ? 'high' : 'medium';
    } else {
      label = 'Clean — No Litter Detected';
      severity = 'low';
    }

    lastResult = {
      label,
      severity,
      probs: [confidence]
    };

    if (result.image) {
      document.getElementById('preview-img').src =
        'data:image/jpeg;base64,' + result.image;
    };

    document.getElementById('result-label').textContent = label;

    const badge = document.getElementById('severity-badge');
    badge.textContent = severity;
    badge.className = 'severity-badge badge-' + severity;

    const barsEl = document.getElementById('conf-bars');
    barsEl.innerHTML = `
      <div class="conf-row">
        <div class="conf-name">Marine Litter</div>
        <div class="conf-track">
          <div class="conf-fill" style="background:#ef4444;width:${Math.round(confidence * 100)}%"></div>
        </div>
        <div class="conf-pct">${Math.round(confidence * 100)}%</div>
      </div>
    `;

    document.getElementById('result-card').style.display = 'block';

  } catch (e) {
    console.error(e);
    alert('Could not connect to detection server or image upload failed');
  }

  btn.disabled = false;
  btn.innerHTML = '↻ Re-analyse';
}

function addPin() {
  if (!lastResult) return;

  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);

  const col = severityColor[lastResult.severity];

  L.marker([lat, lng], { icon: makeCircleIcon(col) })
    .addTo(map)
    .bindPopup(`
      <div>
        <b>${lastResult.label}</b><br>
        Confidence: ${Math.round(lastResult.probs[0] * 100)}%
      </div>
    `)
    .openPopup();

  pinCount++;
  document.getElementById('pin-count').textContent = `${pinCount} sites flagged`;

  map.flyTo([lat, lng], 15);
}

loadModel();

document.getElementById('analyse-btn').addEventListener('click', runInference);
document.getElementById('pin-btn').addEventListener('click', addPin);

});
</script>

</body>
</html>
